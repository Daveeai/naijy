<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowStream — See Thoughts as They Flow</title>
<meta name="description" content="Say what's on your mind. Share your thoughts with Nigeria. No filters, no gatekeepers.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#1f5e43;--green2:#2e7d5a;--light:#eef2f5;--purple:#6c3483;--white:#fff;--text:#1a2e23;--muted:#6b8070;--border:#d4e4da}
body{font-family:Arial,sans-serif;background:var(--light);color:var(--text);font-size:16px;line-height:1.6}
.hero{background:linear-gradient(135deg,#1a0d2e 0%,#4a1580 55%,#6c3483 100%);color:#fff;padding:36px 20px 30px;text-align:center}
.hero .badge{display:inline-block;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:5px 16px;font-size:12px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:#d7bdf7;margin-bottom:14px}
.hero h1{font-size:30px;font-weight:900;margin-bottom:8px}
.hero h1 span{color:#f0c040}
.hero p{font-size:14px;opacity:0.82;max-width:480px;margin:0 auto}
.container{max-width:680px;margin:0 auto;padding:16px 16px 60px}
/* COMPOSE */
.compose-card{background:#fff;border-radius:14px;padding:20px;margin:16px 0;box-shadow:0 2px 12px rgba(0,0,0,0.08);border:2px solid var(--border)}
.compose-top{display:flex;gap:12px;align-items:flex-start}
.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#6c3483,#1f5e43);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.compose-area{flex:1}
.compose-input{width:100%;border:none;outline:none;font-size:16px;font-family:Arial,sans-serif;resize:none;min-height:80px;color:var(--text);line-height:1.55;background:transparent}
.compose-input::placeholder{color:#aaa}
.compose-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.compose-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tag-select{padding:6px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;background:#fff;color:var(--text);outline:none;cursor:pointer}
.char-count{font-size:12px;color:var(--muted)}
.char-count.warn{color:#e67e22}
.char-count.over{color:#c0392b}
.post-btn{padding:10px 22px;background:var(--purple);color:#fff;border:none;border-radius:20px;font-size:14px;font-weight:800;cursor:pointer;transition:all 0.18s}
.post-btn:hover{background:#5a2d6f;transform:translateY(-1px)}
.post-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
/* FILTER */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filter-bar .label{font-size:12px;font-weight:700;color:var(--muted);margin-right:4px}
.filter-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s}
.filter-btn.active,.filter-btn:hover{background:var(--purple);color:#fff;border-color:var(--purple)}
/* STREAM */
.stream-card{background:#fff;border-radius:12px;padding:18px 20px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06);transition:box-shadow 0.15s}
.stream-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.10)}
.sc-top{display:flex;gap:12px;align-items:flex-start}
.sc-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0;font-weight:700}
.sc-meta{flex:1}
.sc-name{font-size:14px;font-weight:800;color:var(--text)}
.sc-info{font-size:12px;color:var(--muted)}
.sc-body{font-size:15px;line-height:1.6;margin:10px 0 12px;color:var(--text)}
.sc-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:8px}
.tag-thoughts{background:#f3e8ff;color:#6c3483}
.tag-politics{background:#fde8e8;color:#c0392b}
.tag-economy{background:#fff8e6;color:#d4ac0d}
.tag-society{background:#e8f5ee;color:#1f5e43}
.tag-culture{background:#e8f0ff;color:#2255cc}
.tag-education{background:#fff0f5;color:#c2185b}
.tag-sports{background:#e8f5fe;color:#0277bd}
.tag-other{background:#f5f5f5;color:#555}
.sc-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.action-btn{background:none;border:none;font-size:13px;color:var(--muted);cursor:pointer;padding:5px 8px;border-radius:6px;transition:all 0.15s;display:flex;align-items:center;gap:4px}
.action-btn:hover{background:#f5f5f5;color:var(--purple)}
.action-btn.liked{color:var(--purple);font-weight:700}
.share-mini{display:flex;gap:4px}
.sm-btn{padding:5px 10px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}
.sm-wa{background:#25D366;color:#fff}
.sm-tw{background:#1DA1F2;color:#fff}
.loading{text-align:center;padding:40px;color:var(--muted)}
.empty{text-align:center;padding:40px;color:var(--muted)}
.stats-bar{display:flex;gap:20px;background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.05);flex-wrap:wrap}
.sb-item{text-align:center}
.sb-num{font-size:20px;font-weight:900;color:var(--purple)}
.sb-lbl{font-size:11px;color:var(--muted)}
@media(max-width:540px){.hero h1{font-size:24px}.compose-bottom{flex-direction:column;gap:10px;align-items:flex-start}}
</style>
</head>
<body>

<div class="hero">
  <div class="badge">🇳🇬 Naijy Platform</div>
  <h1>Flow<span>Stream</span></h1>
  <p>See thoughts as they flow. Say what's on your mind. No algorithm. No gatekeepers. Just Nigerians speaking freely.</p>
</div>

<div class="container">
  <div class="stats-bar">
    <div class="sb-item"><div class="sb-num" id="total-posts">—</div><div class="sb-lbl">Thoughts posted</div></div>
    <div class="sb-item"><div class="sb-num" id="today-posts">—</div><div class="sb-lbl">Posted today</div></div>
    <div class="sb-item"><div class="sb-num" id="total-voices">—</div><div class="sb-lbl">Voices heard</div></div>
  </div>

  <!-- COMPOSE -->
  <div class="compose-card">
    <div class="compose-top">
      <div class="avatar">🇳🇬</div>
      <div class="compose-area">
        <textarea class="compose-input" id="fs-text" placeholder="What's flowing through your mind right now?" maxlength="500" oninput="updateCount()"></textarea>
      </div>
    </div>
    <div class="compose-bottom">
      <div class="compose-meta">
        <select class="tag-select" id="fs-tag">
          <option value="thoughts">💭 Thoughts</option>
          <option value="politics">🏛️ Politics</option>
          <option value="economy">💰 Economy</option>
          <option value="society">🤝 Society</option>
          <option value="culture">🎭 Culture</option>
          <option value="education">📚 Education</option>
          <option value="sports">⚽ Sports</option>
          <option value="other">💡 Other</option>
        </select>
        <input type="text" id="fs-name" placeholder="Your name (optional)" style="padding:6px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;width:160px">
        <span class="char-count" id="char-count">0 / 500</span>
      </div>
      <button class="post-btn" id="fs-btn" onclick="postThought()">💬 Post</button>
    </div>
  </div>

  <!-- FILTER -->
  <div class="filter-bar">
    <span class="label">Filter:</span>
    <button class="filter-btn active" onclick="filterStream('all',this)">All</button>
    <button class="filter-btn" onclick="filterStream('politics',this)">🏛️ Politics</button>
    <button class="filter-btn" onclick="filterStream('economy',this)">💰 Economy</button>
    <button class="filter-btn" onclick="filterStream('society',this)">🤝 Society</button>
    <button class="filter-btn" onclick="filterStream('sports',this)">⚽ Sports</button>
  </div>

  <!-- STREAM -->
  <div id="stream-container"><div class="loading">⏳ Loading the stream...</div></div>
</div>

<script>
var SUPABASE_URL = "https://klrbowhzkaojkqsbtoeu.supabase.co";
var SUPABASE_KEY = "sb_publishable_1weF_9aByeMEVFKHOZFdqg_bA5anAhm";
var TABLE = "flowstream";
var currentFilter = "all";
var COLORS = ["#6c3483","#1f5e43","#c0392b","#2255cc","#e67e22","#0277bd","#c2185b","#d4ac0d"];

function api(path,options){
  return fetch(SUPABASE_URL+"/rest/v1/"+path,Object.assign({
    headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":"return=representation"}
  },options));
}

function updateCount(){
  var len=(document.getElementById("fs-text").value||"").length;
  var el=document.getElementById("char-count");
  el.innerText=len+" / 500";
  el.className="char-count"+(len>450?" warn":"")+(len>=500?" over":"");
}

function timeAgo(d){
  var diff=(Date.now()-new Date(d))/1000;
  if(diff<60) return "just now";
  if(diff<3600) return Math.floor(diff/60)+"m ago";
  if(diff<86400) return Math.floor(diff/3600)+"h ago";
  return Math.floor(diff/86400)+"d ago";
}

function colorFor(name){
  var seed=0;
  for(var i=0;i<(name||"N").length;i++) seed+=(name||"N").charCodeAt(i);
  return COLORS[seed%COLORS.length];
}

function initials(name){
  var n=(name||"?").trim();
  var parts=n.split(" ");
  return parts.length>1 ? parts[0][0]+parts[parts.length-1][0] : n.substring(0,2).toUpperCase();
}

function postThought(){
  var text=(document.getElementById("fs-text").value||"").trim();
  var tag=document.getElementById("fs-tag").value;
  var name=(document.getElementById("fs-name").value||"").trim()||"Anonymous";
  if(!text){alert("Please write something first.");return;}
  var btn=document.getElementById("fs-btn");
  btn.disabled=true; btn.innerText="Posting...";
  var record={content:text,tag:tag,author_name:name,likes:0,created_at:new Date().toISOString()};
  api(TABLE,{method:"POST",body:JSON.stringify(record)})
  .then(function(r){
    if(r.ok||r.status===201){
      document.getElementById("fs-text").value="";
      document.getElementById("fs-name").value="";
      updateCount();
      btn.disabled=false; btn.innerText="💬 Post";
      loadStream();
      loadStats();
    } else { btn.disabled=false; btn.innerText="💬 Post"; alert("Could not post. Try again."); }
  })
  .catch(function(){ btn.disabled=false; btn.innerText="💬 Post"; loadStream(); });
}

function filterStream(type,btn){
  currentFilter=type;
  document.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active");
  loadStream();
}

function loadStream(){
  var container=document.getElementById("stream-container");
  container.innerHTML='<div class="loading">⏳ Loading...</div>';
  var url=TABLE+"?order=created_at.desc&limit=50";
  if(currentFilter!=="all") url+="&tag=eq."+currentFilter;
  api(url).then(function(r){return r.json();}).then(function(data){
    if(!data||!data.length){
      container.innerHTML='<div class="empty"><div style="font-size:40px;margin-bottom:8px">💭</div><p>No thoughts yet in this category. Be the first to post.</p></div>';
      return;
    }
    container.innerHTML=data.map(function(r,idx){
      var color=colorFor(r.author_name);
      var ini=initials(r.author_name);
      var tagLabel={thoughts:"💭 Thoughts",politics:"🏛️ Politics",economy:"💰 Economy",society:"🤝 Society",culture:"🎭 Culture",education:"📚 Education",sports:"⚽ Sports",other:"💡 Other"}[r.tag]||"💭 Thoughts";
      var shareText=encodeURIComponent('"'+r.content+'" — on FlowStream (Naijy) | naijy.ng');
      return '<div class="stream-card" id="card-'+idx+'">' +
        '<div class="sc-top">' +
          '<div class="sc-avatar" style="background:'+color+'">'+ini+'</div>' +
          '<div class="sc-meta">' +
            '<div class="sc-name">'+(r.author_name||"Anonymous")+'</div>' +
            '<div class="sc-info">'+timeAgo(r.created_at)+'</div>' +
          '</div>' +
        '</div>' +
        '<span class="sc-tag tag-'+(r.tag||"other")+'">'+tagLabel+'</span>' +
        '<div class="sc-body">'+r.content+'</div>' +
        '<div class="sc-actions">' +
          '<button class="action-btn" onclick="likePost(\''+r.id+'\','+idx+','+((r.likes||0)+1)+')">❤️ '+(r.likes||0)+'</button>' +
          '<div class="share-mini">' +
            '<button class="sm-btn sm-wa" onclick="window.open(\'https://wa.me/?text='+shareText+'\',\'_blank\')">📱</button>' +
            '<button class="sm-btn sm-tw" onclick="window.open(\'https://twitter.com/intent/tweet?text='+shareText+'\',\'_blank\')">𝕏</button>' +
          '</div>' +
          '<button class="action-btn" onclick="navigator.clipboard.writeText(window.location.href).then(function(){alert(\'Link copied!\')})">🔗 Copy</button>' +
        '</div>' +
      '</div>';
    }).join("");
  }).catch(function(){ container.innerHTML='<div class="empty">⚠️ Could not load stream. Please refresh.</div>'; });
}

function likePost(id,idx,newLikes){
  if(!id) return;
  api(TABLE+"?id=eq."+id,{method:"PATCH",body:JSON.stringify({likes:newLikes})})
  .then(function(){
    var btn=document.querySelector("#card-"+idx+" .action-btn");
    if(btn){ btn.innerHTML="❤️ "+newLikes; btn.classList.add("liked"); }
  });
}

function loadStats(){
  api(TABLE+"?select=author_name,created_at").then(function(r){return r.json();}).then(function(data){
    if(!data) return;
    document.getElementById("total-posts").innerText=data.length;
    document.getElementById("today-posts").innerText=data.filter(function(r){ return new Date(r.created_at).toDateString()===new Date().toDateString(); }).length;
    document.getElementById("total-voices").innerText=new Set(data.map(function(r){return r.author_name;})).size;
  }).catch(function(){});
}

loadStream();
loadStats();
</script>
</body>
</html>
